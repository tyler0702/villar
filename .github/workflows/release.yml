name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust_target: ""
          - platform: windows-latest
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "villar ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/tyler0702/villar/blob/main/CHANGELOG.md) for details.

            **macOS**: Download `.dmg` (Apple Silicon or Intel)
            **Windows**: Download `.msi` installer
            **Linux**: Download `.deb` or `.AppImage`
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Locate and upload updater signatures
        if: matrix.platform == 'macos-latest' || matrix.platform == 'ubuntu-22.04' || matrix.platform == 'windows-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          echo "::group::Search for existing .sig files under src-tauri/target"
          find src-tauri/target -name "*.sig" -type f -print || true
          echo "::endgroup::"

          # If sig files were cleaned up by tauri-action, re-sign the bundle ourselves.
          sign_if_missing() {
            local bundle="$1"
            if [ ! -f "${bundle}.sig" ]; then
              if [ ! -f "$bundle" ]; then
                echo "Bundle not found: $bundle" >&2
                ls -la "$(dirname "$bundle")" >&2 || true
                return 1
              fi
              echo "Re-signing $bundle"
              npx --yes @tauri-apps/cli signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$bundle"
            fi
          }

          upload_sig() {
            local local_sig="$1"
            local release_name="$2"
            cp "$local_sig" "/tmp/${release_name}"
            gh release upload "$TAG" "/tmp/${release_name}" --clobber --repo "${{ github.repository }}"
          }

          case "${{ matrix.rust_target }}-${{ matrix.platform }}" in
            "aarch64-apple-darwin-macos-latest")
              B="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/villar.app.tar.gz"
              sign_if_missing "$B"
              upload_sig "${B}.sig" "villar_aarch64.app.tar.gz.sig"
              ;;
            "x86_64-apple-darwin-macos-latest")
              B="src-tauri/target/x86_64-apple-darwin/release/bundle/macos/villar.app.tar.gz"
              sign_if_missing "$B"
              upload_sig "${B}.sig" "villar_x64.app.tar.gz.sig"
              ;;
            "-ubuntu-22.04")
              B="src-tauri/target/release/bundle/appimage/villar_${VERSION}_amd64.AppImage"
              sign_if_missing "$B"
              upload_sig "${B}.sig" "villar_${VERSION}_amd64.AppImage.sig"
              ;;
            "-windows-latest")
              B="src-tauri/target/release/bundle/nsis/villar_${VERSION}_x64-setup.exe"
              sign_if_missing "$B"
              upload_sig "${B}.sig" "villar_${VERSION}_x64-setup.exe.sig"
              ;;
          esac

  publish-updater:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          mkdir -p /tmp/sigs
          curl -sSL --fail "$BASE/villar_aarch64.app.tar.gz.sig"            -o /tmp/sigs/darwin-aarch64.sig
          curl -sSL --fail "$BASE/villar_x64.app.tar.gz.sig"                -o /tmp/sigs/darwin-x86_64.sig
          curl -sSL --fail "$BASE/villar_${VERSION}_amd64.AppImage.sig"     -o /tmp/sigs/linux-x86_64.sig
          curl -sSL --fail "$BASE/villar_${VERSION}_x64-setup.exe.sig"      -o /tmp/sigs/windows-x86_64.sig

          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          jq -n \
            --arg version "${VERSION}" \
            --arg pub_date "${PUB_DATE}" \
            --arg base "${BASE}" \
            --rawfile darwin_aarch64_sig /tmp/sigs/darwin-aarch64.sig \
            --rawfile darwin_x86_64_sig  /tmp/sigs/darwin-x86_64.sig \
            --rawfile linux_x86_64_sig   /tmp/sigs/linux-x86_64.sig \
            --rawfile windows_x86_64_sig /tmp/sigs/windows-x86_64.sig \
            '{
              version: $version,
              notes: "See https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md for details.",
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $darwin_aarch64_sig, url: ($base + "/villar_aarch64.app.tar.gz") },
                "darwin-x86_64":  { signature: $darwin_x86_64_sig,  url: ($base + "/villar_x64.app.tar.gz") },
                "linux-x86_64":   { signature: $linux_x86_64_sig,   url: ($base + "/villar_" + $version + "_amd64.AppImage") },
                "windows-x86_64": { signature: $windows_x86_64_sig, url: ($base + "/villar_" + $version + "_x64-setup.exe") }
              }
            }' > /tmp/latest.json

          gh release upload "$TAG" /tmp/latest.json --clobber --repo "${{ github.repository }}"

  update-homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Wait for release assets
        run: sleep 30

      - name: Update Homebrew Cask
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"

          # Download DMGs and compute SHA256
          ARM_URL="https://github.com/tyler0702/villar/releases/download/${TAG}/villar_${VERSION}_aarch64.dmg"
          X64_URL="https://github.com/tyler0702/villar/releases/download/${TAG}/villar_${VERSION}_x64.dmg"

          ARM_SHA=$(curl -sL "$ARM_URL" | sha256sum | cut -d' ' -f1)
          X64_SHA=$(curl -sL "$X64_URL" | sha256sum | cut -d' ' -f1)

          # Clone homebrew-tap
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/tyler0702/homebrew-tap.git"
          cd homebrew-tap

          # Write updated cask
          cat > Casks/villar.rb << CASK
          cask "villar" do
            version "${VERSION}"

            on_arm do
              url "https://github.com/tyler0702/villar/releases/download/v#{version}/villar_#{version}_aarch64.dmg"
              sha256 "${ARM_SHA}"
            end

            on_intel do
              url "https://github.com/tyler0702/villar/releases/download/v#{version}/villar_#{version}_x64.dmg"
              sha256 "${X64_SHA}"
            end

            name "villar"
            desc "A beautiful Markdown reader for AI-generated documents"
            homepage "https://tyler0702.github.io/villar/"

            app "villar.app"

            zap trash: [
              "~/Library/Application Support/com.tylerpc.villar",
              "~/Library/Caches/com.tylerpc.villar",
              "~/Library/Preferences/com.tylerpc.villar.plist",
              "~/Library/Saved Application State/com.tylerpc.villar.savedState",
            ]
          end
          CASK

          # Fix indentation (remove leading spaces from heredoc)
          sed -i 's/^          //' Casks/villar.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/villar.rb
          git commit -m "Update villar to ${VERSION}"
          git push
