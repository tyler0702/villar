name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust_target: ""
          - platform: windows-latest
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "villar ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/tyler0702/villar/blob/main/CHANGELOG.md) for details.

            **macOS**: Download `.dmg` (Apple Silicon or Intel)
            **Windows**: Download `.msi` installer
            **Linux**: Download `.deb` or `.AppImage`
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  update-homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Wait for release assets
        run: sleep 30

      - name: Update Homebrew Cask
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"

          # Download DMGs and compute SHA256
          ARM_URL="https://github.com/tyler0702/villar/releases/download/${TAG}/villar_${VERSION}_aarch64.dmg"
          X64_URL="https://github.com/tyler0702/villar/releases/download/${TAG}/villar_${VERSION}_x64.dmg"

          ARM_SHA=$(curl -sL "$ARM_URL" | sha256sum | cut -d' ' -f1)
          X64_SHA=$(curl -sL "$X64_URL" | sha256sum | cut -d' ' -f1)

          # Clone homebrew-tap
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/tyler0702/homebrew-tap.git"
          cd homebrew-tap

          # Write updated cask
          cat > Casks/villar.rb << CASK
          cask "villar" do
            version "${VERSION}"

            on_arm do
              url "https://github.com/tyler0702/villar/releases/download/v#{version}/villar_#{version}_aarch64.dmg"
              sha256 "${ARM_SHA}"
            end

            on_intel do
              url "https://github.com/tyler0702/villar/releases/download/v#{version}/villar_#{version}_x64.dmg"
              sha256 "${X64_SHA}"
            end

            name "villar"
            desc "A beautiful Markdown reader for AI-generated documents"
            homepage "https://tyler0702.github.io/villar/"

            app "villar.app"

            zap trash: [
              "~/Library/Application Support/com.tylerpc.villar",
              "~/Library/Caches/com.tylerpc.villar",
              "~/Library/Preferences/com.tylerpc.villar.plist",
              "~/Library/Saved Application State/com.tylerpc.villar.savedState",
            ]
          end
          CASK

          # Fix indentation (remove leading spaces from heredoc)
          sed -i 's/^          //' Casks/villar.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/villar.rb
          git commit -m "Update villar to ${VERSION}"
          git push
